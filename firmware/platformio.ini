[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    ; ICM-42688 driver (to be selected)
    ; Option A: SparkFun ICM-42688-P
    ; sparkfun/SparkFun ICM-42688-P @ ^1.0.0
    ; Option B: use Wire directly with custom driver (recommended)

    ; Madgwick filter
    arduino-libraries/MadgwickAHRS @ ^1.2.0

    ; BLE (built-in ESP32 Arduino BLE)
    ; No external lib needed

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
