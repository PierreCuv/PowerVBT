<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>VBT Tracker</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0;
         background: #f5f4ef; color: #1c1c1a; display: flex; justify-content: center; }
  .app { width: 100%; max-width: 430px; padding: 14px; }
  .card { background: #fff; border: 1px solid #e3e1d8; border-radius: 16px; padding: 14px 16px 18px; }
  .row { display: flex; align-items: center; justify-content: space-between; }
  .title { font-size: 16px; font-weight: 600; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
           padding: 4px 11px; border-radius: 999px; background: #e1f5ee; color: #085041; }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #1d9e75; }
  .badge.off { background: #f1efe8; color: #444; }
  .badge.off .dot { background: #b4b2a9; }
  select, button { font: inherit; font-size: 14px; padding: 9px 12px; border-radius: 10px;
                   border: 1px solid #d8d6cc; background: #fff; color: inherit; }
  button:active { transform: scale(0.98); }
  .connect { width: 100%; background: #1d9e75; color: #fff; border: none; font-weight: 600;
             padding: 13px; font-size: 15px; margin-bottom: 14px; }
  .big { text-align: center; padding: 10px 0 12px; }
  .big .label { font-size: 12px; color: #75736b; }
  .big .num { font-size: 48px; font-weight: 600; line-height: 1.15; }
  .big .unit { font-size: 16px; color: #a8a69c; font-weight: 400; }
  .big .sub { font-size: 12px; color: #75736b; }
  .lossbar { height: 9px; border-radius: 999px; background: #efede4; overflow: hidden; }
  .lossbar > div { height: 100%; width: 0; border-radius: 999px; background: #1d9e75;
                   transition: width .4s, background .4s; }
  .alert { display: none; margin-top: 8px; font-size: 13px; padding: 8px 11px;
           border-radius: 10px; background: #fcebeb; color: #791f1f; }
  .chart { display: flex; align-items: flex-end; gap: 6px; height: 110px;
           border-bottom: 1px solid #e3e1d8; margin-bottom: 12px; }
  .chart .empty { font-size: 13px; color: #a8a69c; margin: auto; }
  .bar { flex: 1; max-width: 38px; display: flex; flex-direction: column;
         align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .bar .val { font-size: 11px; color: #75736b; }
  .bar .idx { font-size: 11px; color: #a8a69c; }
  .bar .fill { width: 100%; border-radius: 4px 4px 0 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  td { padding: 4px 0; }
  .muted { color: #75736b; }
  .hint { font-size: 12px; color: #a8a69c; text-align: center; margin-top: 12px; }
</style>
</head>
<body>
<div class="app">
<div class="card">

  <div class="row" style="margin-bottom:14px">
    <span class="title">VBT Tracker</span>
    <span class="badge off" id="badge"><span class="dot"></span><span id="badge-txt">Non connecté</span></span>
  </div>

  <button class="connect" id="connect">Connecter le capteur</button>

  <div class="row" style="gap:8px; margin-bottom:10px">
    <select id="exo" style="flex:1">
      <option>Squat</option>
      <option>Développé couché</option>
      <option>Soulevé de terre</option>
      <option>Autre exercice</option>
    </select>
    <button id="sleep-btn" title="Mettre en veille">Veille</button>
  </div>

  <div class="big">
    <div class="label">Vitesse moyenne — dernière rep</div>
    <div class="num"><span id="vmean">—</span><span class="unit"> m/s</span></div>
    <div class="sub">Pic : <span id="vpeak">—</span> m/s · Zone : <span id="zone">—</span></div>
  </div>

  <div style="margin-bottom:14px">
    <div class="row" style="font-size:12px; margin-bottom:5px">
      <span class="muted">Perte de vitesse</span>
      <span id="loss-txt" style="font-weight:600">0%</span>
    </div>
    <div class="lossbar"><div id="loss-bar"></div></div>
    <div class="alert" id="alert">&#9888; Perte &ge; 20 % — fin de série conseillée</div>
  </div>

  <div class="muted" style="font-size:12px; margin-bottom:5px">Vitesse par répétition</div>
  <div class="chart" id="chart"><span class="empty">Connecte le capteur puis bouge la barre…</span></div>

  <div id="replist" style="margin-bottom:14px"></div>

  <div class="row" style="gap:8px">
    <button id="reset-btn" style="flex:1">Nouvelle série</button>
  </div>

  <div class="hint" id="hint">Ouvre cette page dans Bluefy, puis « Connecter ».</div>
</div>
</div>

<script>
var SVC = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
var RX  = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
var TX  = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

var reps = [], rxChar = null, buf = "";
var device = null, txCharRef = null, lastSeen = 0, reconnecting = false, alive = false;
function $(id){ return document.getElementById(id); }

function zoneOf(v){
  if (v < 0.5) return "Force max";
  if (v < 0.75) return "Force-vitesse";
  if (v < 1.0) return "Puissance";
  if (v < 1.3) return "Vitesse-force";
  return "Vitesse";
}
function best(){ var b = 0; for (var i=0;i<reps.length;i++) if (reps[i][0]>b) b=reps[i][0]; return b; }
function lossOf(v){ var b=best(); return b ? Math.max(0,1-v/b) : 0; }

function render(){
  var last = reps[reps.length-1];
  $("vmean").textContent = last ? last[0].toFixed(2) : "—";
  $("vpeak").textContent = last ? last[1].toFixed(2) : "—";
  $("zone").textContent  = last ? zoneOf(last[0]) : "—";

  var pct = last ? Math.round(lossOf(last[0])*100) : 0;
  $("loss-txt").textContent = pct + "%";
  $("loss-bar").style.width = Math.min(100, pct*2.5) + "%";
  $("loss-bar").style.background = pct>=20 ? "#e24b4a" : (pct>=10 ? "#ef9f27" : "#1d9e75");
  $("alert").style.display = pct>=20 ? "block" : "none";

  var c = $("chart"); c.innerHTML = "";
  if (!reps.length){ c.innerHTML = '<span class="empty">En attente de mouvement…</span>'; }
  else {
    var shown = reps.slice(-12), start = reps.length - shown.length;
    shown.forEach(function(r,i){
      var l = Math.round(lossOf(r[0])*100);
      var col = l>=20 ? "#e24b4a" : (l>=10 ? "#ef9f27" : "#1d9e75");
      var h = Math.max(8, Math.round(r[0]/1.1*100));
      var d = document.createElement("div");
      d.className = "bar";
      d.innerHTML = '<span class="val">'+r[0].toFixed(2)+'</span>'+
        '<div class="fill" style="height:'+h+'px;background:'+col+'"></div>'+
        '<span class="idx">'+(start+i+1)+'</span>';
      c.appendChild(d);
    });
  }

  var list = $("replist");
  if (!reps.length){ list.innerHTML = ""; return; }
  var rows = "";
  for (var i=reps.length-1;i>=0;i--){
    var l = Math.round(lossOf(reps[i][0])*100);
    rows += '<tr><td class="muted">Rep '+(i+1)+'</td>'+
      '<td style="text-align:right">'+reps[i][0].toFixed(2)+' m/s</td>'+
      '<td style="text-align:right" class="muted">pic '+reps[i][1].toFixed(2)+'</td>'+
      '<td style="text-align:right;color:'+(l>=20?"#a32d2d":"#75736b")+'">&minus;'+l+'%</td></tr>';
  }
  list.innerHTML = "<table>"+rows+"</table>";
}

function setBadge(on, txt){
  $("badge").className = on ? "badge" : "badge off";
  $("badge-txt").textContent = txt;
}

function handleLine(line){
  line = line.trim();
  if (line === "C"){ reps = []; render(); return; }
  var p = line.split(",");
  if (p[0] === "R" && p.length >= 4){
    var idx = parseInt(p[1]), mean = parseFloat(p[2]), peak = parseFloat(p[3]);
    reps[idx] = [mean, peak];
    render();
  } else if (p[0] === "S"){          // heartbeat : etat,derniereVitesse,nbReps
    var inRep = p[1] === "1";
    setBadge(true, inRep ? "Rep en cours…" : "Connecté");
  }
}

function onNotify(e){
  lastSeen = Date.now();
  var txt = new TextDecoder().decode(e.target.value);
  buf += txt;
  var nl;
  while ((nl = buf.indexOf("\n")) >= 0){
    handleLine(buf.slice(0, nl));
    buf = buf.slice(nl + 1);
  }
}

// Surveille le heartbeat : si plus rien pendant 3 s, le lien est suspect
setInterval(function(){
  if (!device || !device.gatt || !device.gatt.connected) return;
  var silent = Date.now() - lastSeen;
  if (silent > 3000 && alive){ alive = false; setBadge(true, "Signal faible…"); }
  else if (silent <= 3000 && !alive){ alive = true; }
}, 1000);

async function connect(){
  if (!navigator.bluetooth){
    $("hint").textContent = "Web Bluetooth indisponible — ouvre cette page dans Bluefy.";
    return;
  }
  try {
    setBadge(false, "Recherche…");
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: "VBT-Tracker" }],
      optionalServices: [SVC]
    });
    device.addEventListener("gattserverdisconnected", onDisconnected);
    await openGatt();
  } catch(e){
    setBadge(false, "Non connecté");
    $("hint").textContent = "Connexion annulée ou échouée : " + e.message;
  }
}

// Ouvre (ou rouvre) la liaison GATT sur le device déjà choisi
async function openGatt(){
  var srv = await device.gatt.connect();
  var svc = await srv.getPrimaryService(SVC);
  txCharRef = await svc.getCharacteristic(TX);
  rxChar    = await svc.getCharacteristic(RX);
  await txCharRef.startNotifications();
  txCharRef.addEventListener("characteristicvaluechanged", onNotify);
  lastSeen = Date.now(); alive = true; reconnecting = false;
  setBadge(true, "Connecté");
  $("hint").textContent = "";
  await send("D");        // redemande l'historique (utile après reconnexion)
}

function onDisconnected(){
  setBadge(false, "Reconnexion…");
  $("hint").textContent = "Lien perdu — tentative de reconnexion automatique…";
  tryReconnect(1);
}

// Quelques tentatives automatiques avant d'abandonner et de rendre la main
async function tryReconnect(attempt){
  if (reconnecting || !device) return;
  if (attempt > 5){
    reconnecting = false;
    setBadge(false, "Déconnecté");
    $("hint").textContent = "Reconnexion impossible — reclique sur Connecter.";
    return;
  }
  reconnecting = true;
  try {
    await openGatt();
  } catch(e){
    reconnecting = false;
    setTimeout(function(){ tryReconnect(attempt + 1); }, 1200);
  }
}

async function send(cmd){
  if (!rxChar) return;
  try { await rxChar.writeValue(new TextEncoder().encode(cmd)); } catch(e){}
}

$("connect").addEventListener("click", connect);
$("reset-btn").addEventListener("click", function(){ reps = []; render(); send("R"); });
$("sleep-btn").addEventListener("click", function(){
  send("S"); setBadge(false, "Veille");
  $("hint").textContent = "Secoue le capteur pour le réveiller, puis reconnecte.";
});

render();
</script>
</body>
</html>
